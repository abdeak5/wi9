    <style>
        :root {
            --primary-dark: #0d1e3d;
            --accent-orange: #e05624;
            --text-light: #f8f9fa;
            --text-dark: #212529;
            --bg-base: #060d1a;
            
            /* Social Platforms Branding */
            --whatsapp-color: #25D366;
            --telegram-color: #0088cc;
            --instagram-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);

            --linkedin-color: #0077b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Kufi Arabic', 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #102347 0%, var(--bg-base) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphism card */
        .redirect-card {
            background: rgba(13, 30, 61, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Ambient glow in background */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-orange);
            filter: blur(100px);
            opacity: 0.15;
            z-index: 1;
            transition: background 0.8s ease, filter 0.8s ease;
        }

        .icon-container {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            position: relative;
            transition: all 0.5s ease;
        }

        .icon-container svg {
            width: 45px;
            height: 45px;
            fill: var(--text-light);
            transition: transform 0.3s ease, fill 0.5s ease;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            top: -5px; right: -5px; bottom: -5px; left: -5px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .platform-name {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        .status-msg {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 50px;
        }

        /* Countdown & Loader */
        .loader-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 30px;
        }

        .circular-loader {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circular-loader circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .circular-loader .bg-circle {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .circular-loader .progress-circle {
            stroke: var(--accent-orange);
            stroke-dasharray: 220;
            stroke-dashoffset: 220;
            transition: stroke-dashoffset 0.1s linear, stroke 0.5s ease;
        }

        .countdown-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--text-light);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--accent-orange);

            box-shadow: 0 4px 15px rgba(224, 86, 36, 0.3);
        }

        .btn-primary:hover {

        .btn-secondary {

            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;

        }
    </style>

                svg: `<svg viewBox="0 0 24 24"><path d="M11.944 0C5.347 0 0 5.347 0 11.944c0 6.595 5.347 11.944 11.944 11.944 6.595 0 11.944-5.349 11.944-11.944C23.888 5.347 18.539 0 11.944 0zm5.282 8.314l-1.8 8.484c-.135.604-.493.754-.997.472l-2.74-2.02-1.322 1.272c-.147.147-.269.269-.553.269l.197-2.793 5.086-4.593c.221-.197-.048-.307-.343-.111l-6.287 3.958-2.707-.847c-.588-.184-.6-.588.123-.871l10.567-4.072c.49-.18.919.113.774.832z"/></svg>`

                svg: `<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`
            }
        };

        // Parse query params
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const platformKey = (getQueryParam('platform') || '').toLowerCase();
        const platform = platforms[platformKey];

        const card = document.getElementById('card');
        const glow = document.getElementById('glow');
        const iconBox = document.getElementById('icon-box');
        const platformTitle = document.getElementById('platform-title');
        const statusText = document.getElementById('status-text');
        const countdownEl = document.getElementById('countdown');
        const progressBar = document.getElementById('progress-bar');
        const redirectBtn = document.getElementById('redirect-btn');
        const loaderWrap = document.getElementById('loader-wrap');

        if (!platform) {
            // Invalid platform specified
            card.classList.add('error-card');
            iconBox.innerHTML = '⚠️';
            iconBox.style.fontSize = '36px';
            platformTitle.textContent = 'رابط غير صالح';
            statusText.textContent = 'عذراً، لم نتمكن من التعرف على منصة التواصل الاجتماعي المطلوبة. يرجى العودة للصفحة الرئيسية.';
            loaderWrap.style.display = 'none';
            redirectBtn.style.display = 'none';
        } else {
            // Apply platform branding
            document.title = `توجيه إلى ${platform.name}`;
            card.className = `redirect-card theme-${platformKey}`;
            glow.style.background = platform.color;
            glow.style.opacity = '0.2';
            iconBox.innerHTML = platform.svg;
            platformTitle.textContent = platform.name;
            statusText.textContent = 'جاري التحقق من خوادم قاعدة البيانات...';

            // Fetch actual target URL from Supabase
            fetch(`${supabaseUrl}/rest/v1/adsense_config?id=eq.1`, {
                headers: {
                    'apikey': supabaseKey,
                    'Authorization': `Bearer ${supabaseKey}`
                }
            })
            .then(r => {
                if (!r.ok) throw new Error('Database error');
                return r.json();
            })
            .then(data => {
                if (data && data.length > 0 && data[0][platform.dbColumn] && data[0][platform.dbColumn] !== '#') {
                    let targetUrl = data[0][platform.dbColumn].trim();
                    if (!/^https?:\/\//i.test(targetUrl)) {
                        targetUrl = 'https://' + targetUrl;
                    }
                    statusText.textContent = platform.message;
                    startRedirect(targetUrl);
                } else {
                    showUrlError();
                }
            })
            .catch(err => {
                console.error(err);
                showUrlError();
            });
        }

        function showUrlError() {
            card.classList.add('error-card');
            iconBox.innerHTML = '❌';
            iconBox.style.fontSize = '36px';
            platformTitle.textContent = 'رابط غير متوفر';
            statusText.textContent = `عذراً، رابط حسابنا على ${platform.name} لم يتم تفعيله أو تعيينه من قبل الإدارة بعد. يرجى التواصل معنا لاحقاً.`;
            loaderWrap.style.display = 'none';
            redirectBtn.style.display = 'none';
        }

        function startRedirect(url) {
            // Enable direct redirection button
            redirectBtn.setAttribute('href', url);
            redirectBtn.style.pointerEvents = 'auto';
            redirectBtn.style.opacity = '1';

            let count = 3;
            countdownEl.textContent = count;
            
            // Progress dash array size is 220
            progressBar.style.strokeDashoffset = 0;
            progressBar.style.transition = 'stroke-dashoffset 3s linear';
            
            // Force redraw then animate dashoffset to 220 (empty)
            setTimeout(() => {
                progressBar.style.strokeDashoffset = 220;
            }, 50);

            const interval = setInterval(() => {
                count--;
                if (count >= 0) {
                    countdownEl.textContent = count;
                }
                if (count <= 0) {
                    clearInterval(interval);
                    window.location.href = url;
                }
            }, 1000);
        }
    </script>
</body>
